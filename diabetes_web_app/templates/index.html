<!DOCTYPE html>
<html>
<head>
    <title>Diabetes Risk Assessment</title>

    <style>
        body {
            font-family: "Segoe UI", Tahoma, sans-serif;
            background: #f4f6f9;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            width: 420px;
            padding: 35px;
            border-radius: 10px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }

        .title {
            text-align: center;
            margin-bottom: 10px;
            font-size: 22px;
            font-weight: 600;
            color: #2c3e50;
        }

        .subtitle {
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 25px;
            font-size: 14px;
        }

        label {
            font-size: 13px;
            color: #2c3e50;
            display: block;
            margin-top: 12px;
        }

        input {
            width: 100%;
            padding: 9px;
            margin-top: 4px;
            border-radius: 6px;
            border: 1px solid #dcdde1;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 11px;
            margin-top: 20px;
            border: none;
            border-radius: 6px;
            background: #2c7be5;
            color: white;
            font-size: 15px;
            cursor: pointer;
        }

        button:hover {
            background: #1a68d1;
        }

        .center {
            text-align: center;
        }

        .hidden {
            display: none;
        }

        .result {
            margin-top: 20px;
            text-align: center;
            font-size: 20px;
            font-weight: 600;
            color: #2c3e50;
        }
    </style>
</head>

<body>

<div class="container">

    <!-- STEP 1 -->
    <div id="startSection" class="center">
        <div class="title">Diabetes Risk Assessment</div>
        <div class="subtitle">Clinical screening based on medical parameters</div>

        <p>Would you like to check your diabetes status?</p>
        <button onclick="showForm()">Start Assessment</button>
    </div>

    <!-- STEP 2 FORM -->
    <div id="formSection" class="hidden">
        <div class="title">Patient Information</div>

        <form action="/predict" method="post">
            <label>Pregnancies</label>
            <input type="number" name="preg" required>

            <label>Glucose Level</label>
            <input type="number" name="glu" required>

            <label>Blood Pressure</label>
            <input type="number" name="bp" required>

            <label>Skin Thickness</label>
            <input type="number" name="skin" required>

            <label>Insulin Level</label>
            <input type="number" name="insulin" required>

            <label>Body Mass Index (BMI)</label>
            <input type="text" name="bmi" required>

            <label>Diabetes Pedigree Function</label>
            <input type="text" name="dpf" required>

            <label>Age</label>
            <input type="number" name="age" required>

            <button type="submit">Generate Result</button>
        </form>
    </div>

    <!-- RESULT -->
    {% if prediction_text %}
    <div class="result">
        {{ prediction_text }}
    </div>
    {% endif %}

</div>

<script>
function showForm() {
    document.getElementById("startSection").style.display = "none";
    document.getElementById("formSection").style.display = "block";
}
</script>

</body>
</html>
